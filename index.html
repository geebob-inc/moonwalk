<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geebob AI 🤖</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  height:100vh;
}

.sidebar{
  width:260px;
  background:green;
  color:white;
  padding:15px;
}

.main{
  flex:1;
  padding:15px;
  background:#f4f4f4;
  display:flex;
  flex-direction:column;
}

textarea{
  width:100%;
  height:80px;
  margin-bottom:10px;
}

.chat{
  flex:1;
  background:white;
  padding:10px;
  overflow:auto;
}

.msg{
  margin:8px 0;
}

.user{color:green;}
.bot{color:black;}

button{
  margin:5px;
  padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>🗒 Notes</h3>
<textarea id="note"></textarea>
<button onclick="saveNote()">Save Note</button>

<h3>🎤 Voice</h3>
<button onclick="startVoice()">Speak</button>
</div>

<div class="main">

<h2>🤖 AI Chat</h2>

<div class="chat" id="chat"></div>

<input id="input" placeholder="Ask AI..." />
<button onclick="send()">Send</button>

</div>

<script>

let memory = localStorage.getItem("memory") || "";

function addMsg(text,type){
  const div = document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

/* =========================
   ⚡ STREAMING TYPE EFFECT
========================= */
function streamText(text, callback){
  let i = 0;
  const div = document.createElement("div");
  div.className="msg bot";
  document.getElementById("chat").appendChild(div);

  const interval = setInterval(()=>{
    div.textContent += text[i];
    i++;
    if(i>=text.length){
      clearInterval(interval);
      callback && callback();
    }
  },20);
}

/* =========================
   🤖 AI CALL (CHANGE THIS URL)
========================= */
async function askAI(msg){

  const res = await fetch("https://YOUR-BACKEND/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      message: msg,
      memory: memory
    })
  });

  const data = await res.json();
  return data.reply;
}

/* =========================
   SEND MESSAGE
========================= */
async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMsg(text,"user");
  input.value="";

  const reply = await askAI(text);

  memory += "\nUser: "+text+"\nAI: "+reply;
  localStorage.setItem("memory", memory);

  streamText(reply);
}

/* =========================
   🎤 VOICE INPUT
========================= */
function startVoice(){
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "en-US";

  rec.onresult = (e)=>{
    document.getElementById("input").value = e.results[0][0].transcript;
    send();
  };

  rec.start();
}

/* =========================
   🔊 VOICE OUTPUT
========================= */
function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

/* =========================
   💾 NOTES (LOCAL CLOUD SIM)
========================= */
document.getElementById("note").value =
localStorage.getItem("note") || "";

function saveNote(){
  localStorage.setItem("note", document.getElementById("note").value);
}

</script>

</body>
</html>
