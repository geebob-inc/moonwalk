<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Galaxy-Battle-II</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:#0ff;
  font-family:Arial;
  font-size:14px;
  text-shadow:0 0 10px #0ff;
}

#start {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-family:Arial;
  text-align:center;
}

button {
  padding:10px 20px;
  background:#0ff;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="hud"></div>

<div id="start">
  <h1>Galaxy-Battle-II</h1>
  <button onclick="startGame()">START</button>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

// ================= AUDIO =================
const AC = new (window.AudioContext || window.webkitAudioContext)();
let audioUnlocked = false;

function unlockAudio(){
  if(audioUnlocked) return;
  AC.resume();
  audioUnlocked = true;
}
addEventListener("click", unlockAudio);
addEventListener("keydown", unlockAudio);

function sound(type){
  if(!audioUnlocked) return;

  const o = AC.createOscillator();
  const g = AC.createGain();

  o.connect(g);
  g.connect(AC.destination);

  g.gain.setValueAtTime(0.0001, AC.currentTime);

  // 🔫 LASER
  if(type === "laser"){
    o.type = "square";
    o.frequency.setValueAtTime(900, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(180, AC.currentTime + 0.08);

    g.gain.exponentialRampToValueAtTime(0.08, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 0.08);
  }

  // 💥 EXPLOSION
  if(type === "boom"){
    o.type = "sawtooth";
    o.frequency.setValueAtTime(160, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, AC.currentTime + 0.25);

    g.gain.exponentialRampToValueAtTime(0.25, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 0.25);
  }

  // 💢 HIT
  if(type === "hit"){
    o.type = "triangle";
    o.frequency.setValueAtTime(500, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(120, AC.currentTime + 0.1);

    g.gain.exponentialRampToValueAtTime(0.12, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 0.1);
  }

  o.start();
  o.stop(AC.currentTime + 0.3);
}

// ================= GAME STATE =================
let bullets=[], enemies=[];
let score=0, health=100, lives=3;
let running=false;

// ================= PLAYER =================
let player={
  x:c.width/2,
  y:c.height-100,
  speed:7,
  fireRate:10,
  cd:0
};

// ================= START =================
function startGame(){
  document.getElementById("start").style.display="none";
  running=true;
  initStars();
  loop();
}

// ================= INPUT =================
let keys={};
addEventListener("keydown",e=>keys[e.code]=true);
addEventListener("keyup",e=>keys[e.code]=false);

// ================= STARS =================
let stars=[];

function initStars(){
  stars=[];
  for(let i=0;i<600;i++){
    stars.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      z:Math.random()*3+0.5,
      tw:Math.random()*Math.PI*2
    });
  }
}

// ================= BACKGROUND =================
function bg(){
  let g = ctx.createRadialGradient(
    c.width/2,c.height/2,0,
    c.width/2,c.height/2,c.width
  );

  g.addColorStop(0,"#07081a");
  g.addColorStop(1,"#000");

  ctx.fillStyle=g;
  ctx.fillRect(0,0,c.width,c.height);

  for(let s of stars){
    s.tw += 0.05;
    let glow = Math.sin(s.tw)*0.5+0.5;

    ctx.globalAlpha = (s.z/3)*glow;

    ctx.fillStyle="#fff";
    ctx.fillRect(s.x,s.y,s.z,s.z);

    ctx.fillStyle="rgba(0,255,255,0.3)";
    ctx.fillRect(s.x+1,s.y+1,s.z,s.z);

    s.y += s.z*1.2;

    if(s.y>c.height){
      s.y=0;
      s.x=Math.random()*c.width;
    }
  }

  ctx.globalAlpha=1;
}

// ================= PLAYER =================
function drawPlayer(){
  ctx.save();
  ctx.translate(player.x,player.y);

  let flame = ctx.createLinearGradient(0,20,0,60);
  flame.addColorStop(0,"rgba(0,255,255,0.9)");
  flame.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle=flame;
  ctx.beginPath();
  ctx.moveTo(-7,20);
  ctx.lineTo(0,60);
  ctx.lineTo(7,20);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur=30;
  ctx.shadowColor="#0ff";

  let body = ctx.createLinearGradient(0,-30,0,30);
  body.addColorStop(0,"#e0ffff");
  body.addColorStop(0.5,"#00e5ff");
  body.addColorStop(1,"#0033ff");

  ctx.fillStyle=body;

  ctx.beginPath();
  ctx.moveTo(0,-30);
  ctx.lineTo(-18,20);
  ctx.lineTo(0,8);
  ctx.lineTo(18,20);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(0,-7,4,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ================= BULLETS =================
function drawBullet(b){
  ctx.shadowBlur=15;
  ctx.shadowColor="yellow";

  let g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+20);
  g.addColorStop(0,"#fff");
  g.addColorStop(1,"rgba(255,255,0,0)");

  ctx.fillStyle=g;
  ctx.fillRect(b.x,b.y,3,16);
}

// ================= ENEMY =================
function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);

  ctx.shadowBlur=30;
  ctx.shadowColor="red";

  let core = ctx.createRadialGradient(0,0,2,0,0,25);
  core.addColorStop(0,"#fff");
  core.addColorStop(0.2,"#ff5555");
  core.addColorStop(1,"#220000");

  ctx.fillStyle=core;

  ctx.beginPath();
  ctx.moveTo(0,-20);
  ctx.lineTo(-18,0);
  ctx.lineTo(0,22);
  ctx.lineTo(18,0);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle="rgba(255,0,0,0.6)";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(0,0,20,0,Math.PI*2);
  ctx.stroke();

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(0,0,3,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ================= MOVE =================
function move(){
  if(keys["ArrowLeft"]) player.x-=player.speed;
  if(keys["ArrowRight"]) player.x+=player.speed;
  if(keys["ArrowUp"]) player.y-=player.speed;
  if(keys["ArrowDown"]) player.y+=player.speed;
}

// ================= SHOOT =================
function shoot(){
  if(keys["Space"] && player.cd<=0){
    bullets.push({x:player.x,y:player.y-20,v:10});
    sound("laser");
    player.cd=player.fireRate;
  }
  player.cd--;
}

// ================= SPAWN =================
function spawn(){
  if(Math.random()<0.03){
    enemies.push({
      x:Math.random()*c.width,
      y:-20,
      s:2+Math.random()*2,
      hp:2
    });
  }
}

// ================= ENEMIES =================
function updateEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    e.y+=e.s;

    drawEnemy(e);

    if(Math.hypot(e.x-player.x,e.y-player.y)<20){
      health-=10;
      sound("hit");
      enemies.splice(i,1);
    }

    for(let j=bullets.length-1;j>=0;j--){
      let b=bullets[j];

      if(Math.hypot(e.x-b.x,e.y-b.y)<15){
        e.hp--;
        bullets.splice(j,1);

        if(e.hp<=0){
          score+=10;
          sound("boom");
          enemies.splice(i,1);
        }
        break;
      }
    }

    if(e.y>c.height) enemies.splice(i,1);
  }
}

// ================= BULLETS UPDATE =================
function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    b.y-=b.v;

    drawBullet(b);

    if(b.y<0) bullets.splice(i,1);
  }
}

// ================= HUD =================
function hud(){
  document.getElementById("hud").innerHTML =
  `Galaxy-Battle-II | Score: ${score} | HP: ${health} | Lives: ${lives}`;
}

// ================= LOOP =================
function loop(){
  if(!running) return;

  bg();
  move();
  shoot();

  drawPlayer();
  updateBullets();

  spawn();
  updateEnemies();

  if(health<=0){
    lives--;
    health=100;

    if(lives<=0){
      running=false;
      alert("GAME OVER - Score: "+score);
      location.reload();
    }
  }

  hud();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
