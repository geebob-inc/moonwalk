<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Galaxy Battle - Sound Edition</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:#0ff;
  font-family:Arial;
  font-size:14px;
}
</style>
</head>
<body>

<div id="hud"></div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

// ---------------- AUDIO SYSTEM ----------------
const AC = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
  const o = AC.createOscillator();
  const g = AC.createGain();

  o.connect(g);
  g.connect(AC.destination);

  if(type==="laser"){
    o.type="square";
    o.frequency.setValueAtTime(900, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(200, AC.currentTime+0.1);
    g.gain.setValueAtTime(0.1, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, AC.currentTime+0.1);
  }

  if(type==="boom"){
    o.type="sawtooth";
    o.frequency.setValueAtTime(120, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, AC.currentTime+0.4);
    g.gain.setValueAtTime(0.25, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, AC.currentTime+0.4);
  }

  if(type==="hit"){
    o.type="triangle";
    o.frequency.setValueAtTime(500, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(150, AC.currentTime+0.08);
    g.gain.setValueAtTime(0.08, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, AC.currentTime+0.08);
  }

  o.start();
  o.stop(AC.currentTime+0.5);
}

// ---------------- SAVE ----------------
let save = { best:0, level:1 };

function loadSave(){
  let s = localStorage.getItem("galaxySave");
  if(s) save = JSON.parse(s);
}

function writeSave(){
  save.best = Math.max(save.best, score);
  save.level = player.level;
  localStorage.setItem("galaxySave", JSON.stringify(save));
}

setInterval(writeSave, 3000);
loadSave();

// ---------------- INPUT ----------------
let keys={};
addEventListener("keydown",e=>keys[e.code]=true);
addEventListener("keyup",e=>keys[e.code]=false);

// ---------------- GAME STATE ----------------
let bullets=[], enemies=[], particles=[];
let score=0, health=100, lives=3, gameOver=false;

// ---------------- PLAYER ----------------
let player={
  x:c.width/2,
  y:c.height-120,
  speed:7,
  level:save.level,
  cd:0
};

// ---------------- STARS ----------------
let stars=[];
for(let i=0;i<350;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    z:Math.random()*3+1
  });
}

// ---------------- BACKGROUND ----------------
function bg(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,c.width,c.height);

  for(let s of stars){
    ctx.fillStyle="white";
    ctx.fillRect(s.x,s.y,s.z,s.z);

    s.y += s.z*0.4;
    if(s.y>c.height){
      s.y=0;
      s.x=Math.random()*c.width;
    }
  }
}

// ---------------- PLAYER ----------------
function drawPlayer(){
  ctx.save();
  ctx.translate(player.x,player.y);

  ctx.shadowBlur=25;
  ctx.shadowColor="#00ffff";

  let g = ctx.createLinearGradient(0,-30,0,30);
  g.addColorStop(0,"#bffcff");
  g.addColorStop(0.5,"#00e5ff");
  g.addColorStop(1,"#0066ff");

  ctx.fillStyle=g;

  ctx.beginPath();
  ctx.moveTo(0,-28);
  ctx.lineTo(-18,25);
  ctx.lineTo(0,12);
  ctx.lineTo(18,25);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(0,-5,4,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="orange";
  ctx.globalAlpha=0.8;
  ctx.beginPath();
  ctx.moveTo(-8,25);
  ctx.lineTo(0,25+Math.random()*10);
  ctx.lineTo(8,25);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha=1;

  ctx.restore();
}

// ---------------- MOVEMENT ----------------
function movePlayer(){
  if(keys["ArrowLeft"]) player.x-=player.speed;
  if(keys["ArrowRight"]) player.x+=player.speed;
  if(keys["ArrowUp"]) player.y-=player.speed;
  if(keys["ArrowDown"]) player.y+=player.speed;

  player.x=Math.max(0,Math.min(c.width,player.x));
  player.y=Math.max(0,Math.min(c.height,player.y));
}

// ---------------- SHOOT ----------------
function shoot(){
  if(keys["Space"] && player.cd<=0){
    sound("laser");

    bullets.push({x:player.x,y:player.y-20,v:12});
    player.cd=10;
  }
  player.cd--;
}

// ---------------- BULLETS ----------------
function updateBullets(){
  ctx.fillStyle="yellow";

  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    b.y-=b.v;
    ctx.fillRect(b.x,b.y,3,10);
    if(b.y<0) bullets.splice(i,1);
  }
}

// ---------------- ENEMY (GRAPHICS UPGRADED) ----------------
function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);

  ctx.shadowBlur=20;
  ctx.shadowColor="red";

  let g = ctx.createRadialGradient(0,0,5,0,0,30);
  g.addColorStop(0,"#ffaaaa");
  g.addColorStop(0.5,"#ff2a2a");
  g.addColorStop(1,"#550000");

  ctx.fillStyle=g;

  ctx.beginPath();
  ctx.moveTo(0,-20);
  ctx.lineTo(-20,0);
  ctx.lineTo(0,25);
  ctx.lineTo(20,0);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(0,0,4,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ---------------- ENEMIES ----------------
let wave=0;

function spawnEnemies(){
  wave++;
  if(wave>60){
    for(let i=0;i<4;i++){
      enemies.push({
        x:Math.random()*c.width,
        y:-30,
        s:2+Math.random()*2
      });
    }
    wave=0;
  }
}

function drawEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    e.y+=e.s;

    drawEnemy(e);

    if(Math.hypot(e.x-player.x,e.y-player.y)<30){
      health-=1;
    }

    for(let j=bullets.length-1;j>=0;j--){
      let b=bullets[j];

      if(Math.hypot(e.x-b.x,e.y-b.y)<20){
        sound("boom");

        enemies.splice(i,1);
        bullets.splice(j,1);
        score+=10;
        break;
      }
    }

    if(e.y>c.height) enemies.splice(i,1);
  }
}

// ---------------- LIFE SYSTEM ----------------
function checkDeath(){
  if(health<=0){
    lives--;
    health=100;

    if(lives<=0){
      gameOver=true;
    }
  }
}

// ---------------- HUD ----------------
function hud(){
  document.getElementById("hud").innerText =
  `Score:${score} | Best:${save.best} | HP:${health} | Lives:${lives} | Level:${player.level}`;
}

// ---------------- LOOP ----------------
function loop(){
  bg();

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",c.width/2-150,c.height/2);
    return;
  }

  movePlayer();
  shoot();

  drawPlayer();
  updateBullets();
  spawnEnemies();
  drawEnemies();

  checkDeath();
  hud();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
