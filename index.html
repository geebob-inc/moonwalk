<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Battle II Remake</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial;
}

canvas{
    display:block;
    background:#000;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    color:#0ff;
    font-size:18px;
    text-shadow:0 0 10px #0ff;
}

#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
}

#menu h1{
    font-size:50px;
    color:cyan;
    text-shadow:0 0 20px cyan;
}

button{
    padding:12px 28px;
    border:none;
    background:cyan;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}

a{
    position:absolute;
    top:10px;
    right:10px;
    color:lime;
    text-decoration:none;
    font-size:16px;
}
</style>
</head>

<body>

<a href="https://geebob-inc.github.io/main-page" target="_blank">
Geebob Inc.
</a>

<div id="hud"></div>

<div id="menu">
    <h1>⚔ GALAXY BATTLE II ⚔</h1>
    <p>Defend the galaxy from enemy ships</p>
    <button onclick="startGame()">START GAME</button>
</div>

<canvas id="game"></canvas>

<script>

/* ================= CANVAS ================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

/* ================= AUDIO ================= */

const AC=new(window.AudioContext||window.webkitAudioContext)();

function sound(type){

    const o=AC.createOscillator();
    const g=AC.createGain();

    o.connect(g);
    g.connect(AC.destination);

    if(type=="laser"){
        o.type="square";
        o.frequency.value=800;
        g.gain.value=0.04;
    }

    if(type=="boom"){
        o.type="sawtooth";
        o.frequency.value=120;
        g.gain.value=0.09;
    }

    if(type=="hit"){
        o.type="triangle";
        o.frequency.value=300;
        g.gain.value=0.05;
    }

    o.start();
    o.stop(AC.currentTime+0.12);
}

/* ================= PLAYER ================= */

class Player{

    constructor(){

        this.x=canvas.width/2;
        this.y=canvas.height-100;

        this.speed=6;

        this.radius=20;

        this.hp=100;

        this.lives=3;

        this.bullets=[];

        this.fireRate=150;

        this.lastShot=0;
    }

    draw(){

        ctx.save();

        ctx.translate(this.x,this.y);

        ctx.shadowBlur=30;
        ctx.shadowColor="cyan";

        let g=ctx.createLinearGradient(0,-30,0,30);

        g.addColorStop(0,"white");
        g.addColorStop(0.5,"cyan");
        g.addColorStop(1,"blue");

        ctx.fillStyle=g;

        ctx.beginPath();
        ctx.moveTo(0,-28);
        ctx.lineTo(-20,20);
        ctx.lineTo(0,10);
        ctx.lineTo(20,20);
        ctx.closePath();

        ctx.fill();

        // cockpit
        ctx.fillStyle="white";

        ctx.beginPath();
        ctx.arc(0,-8,5,0,Math.PI*2);
        ctx.fill();

        // flame
        let flame=ctx.createLinearGradient(0,20,0,55);

        flame.addColorStop(0,"rgba(0,255,255,0.9)");
        flame.addColorStop(1,"rgba(0,0,0,0)");

        ctx.fillStyle=flame;

        ctx.beginPath();
        ctx.moveTo(-7,20);
        ctx.lineTo(0,55);
        ctx.lineTo(7,20);
        ctx.closePath();

        ctx.fill();

        ctx.restore();
    }
}

/* ================= BULLET ================= */

class Bullet{

    constructor(x,y){

        this.x=x;
        this.y=y;

        this.speed=10;

        this.radius=3;
    }

    update(){

        this.y-=this.speed;
    }

    draw(){

        ctx.shadowBlur=20;
        ctx.shadowColor="yellow";

        let g=ctx.createLinearGradient(this.x,this.y,this.x,this.y+20);

        g.addColorStop(0,"white");
        g.addColorStop(1,"yellow");

        ctx.fillStyle=g;

        ctx.fillRect(this.x,this.y,3,16);
    }
}

/* ================= ENEMY ================= */

class Enemy{

    constructor(){

        this.x=Math.random()*canvas.width;

        this.y=-40;

        this.speed=2+Math.random()*2;

        this.radius=18;

        this.hp=2;
    }

    update(){

        this.y+=this.speed;
    }

    draw(){

        ctx.save();

        ctx.translate(this.x,this.y);

        ctx.shadowBlur=30;
        ctx.shadowColor="red";

        let core=ctx.createRadialGradient(0,0,2,0,0,25);

        core.addColorStop(0,"white");
        core.addColorStop(0.2,"#ff4444");
        core.addColorStop(1,"#220000");

        ctx.fillStyle=core;

        ctx.beginPath();
        ctx.moveTo(0,-20);
        ctx.lineTo(-18,0);
        ctx.lineTo(0,22);
        ctx.lineTo(18,0);
        ctx.closePath();

        ctx.fill();

        ctx.strokeStyle="rgba(255,0,0,0.5)";
        ctx.lineWidth=2;

        ctx.beginPath();
        ctx.arc(0,0,20,0,Math.PI*2);
        ctx.stroke();

        ctx.restore();
    }
}

/* ================= STARS ================= */

let stars=[];

function createStars(){

    stars=[];

    for(let i=0;i<500;i++){

        stars.push({

            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            z:Math.random()*3+0.5,
            tw:Math.random()*Math.PI*2
        });
    }
}

function drawBackground(){

    let g=ctx.createRadialGradient(
        canvas.width/2,
        canvas.height/2,
        0,
        canvas.width/2,
        canvas.height/2,
        canvas.width
    );

    g.addColorStop(0,"#07081a");
    g.addColorStop(1,"#000");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let s of stars){

        s.tw+=0.05;

        let glow=Math.sin(s.tw)*0.5+0.5;

        ctx.globalAlpha=(s.z/3)*glow;

        ctx.fillStyle="white";
        ctx.fillRect(s.x,s.y,s.z,s.z);

        ctx.fillStyle="rgba(0,255,255,0.3)";
        ctx.fillRect(s.x+1,s.y+1,s.z,s.z);

        s.y+=s.z*1.2;

        if(s.y>canvas.height){

            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    }

    ctx.globalAlpha=1;
}

/* ================= GAME STATE ================= */

let player=new Player();

let enemies=[];

let score=0;

let running=false;

let gameOver=false;

/* ================= INPUT ================= */

const keys={};

addEventListener("keydown",e=>keys[e.key]=true);

addEventListener("keyup",e=>keys[e.key]=false);

/* ================= START ================= */

function startGame(){

    document.getElementById("menu").style.display="none";

    createStars();

    running=true;

    loop();
}

/* ================= MOVEMENT ================= */

function movePlayer(){

    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;
    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;

    player.x=Math.max(20,Math.min(canvas.width-20,player.x));
    player.y=Math.max(20,Math.min(canvas.height-20,player.y));
}

/* ================= SHOOT ================= */

function shoot(){

    let now=Date.now();

    if(keys[" "] && now-player.lastShot>player.fireRate){

        player.bullets.push(
            new Bullet(player.x,player.y-20)
        );

        player.lastShot=now;

        sound("laser");
    }
}

/* ================= BULLETS ================= */

function updateBullets(){

    for(let i=player.bullets.length-1;i>=0;i--){

        let b=player.bullets[i];

        b.update();

        b.draw();

        if(b.y<0){

            player.bullets.splice(i,1);
        }
    }
}

/* ================= SPAWN ENEMIES ================= */

function spawnEnemies(){

    if(Math.random()<0.03){

        enemies.push(new Enemy());
    }
}

/* ================= ENEMIES ================= */

function updateEnemies(){

    for(let i=enemies.length-1;i>=0;i--){

        let e=enemies[i];

        e.update();

        e.draw();

        // player hit
        if(Math.hypot(player.x-e.x,player.y-e.y)<25){

            player.hp-=20;

            enemies.splice(i,1);

            sound("hit");

            if(player.hp<=0){

                player.lives--;

                player.hp=100;

                if(player.lives<=0){

                    gameOver=true;
                }
            }
        }

        // bullet collision
        for(let j=player.bullets.length-1;j>=0;j--){

            let b=player.bullets[j];

            if(Math.hypot(b.x-e.x,b.y-e.y)<20){

                e.hp--;

                player.bullets.splice(j,1);

                if(e.hp<=0){

                    score+=10;

                    enemies.splice(i,1);

                    sound("boom");
                }

                break;
            }
        }

        if(e.y>canvas.height+50){

            enemies.splice(i,1);
        }
    }
}

/* ================= HUD ================= */

function drawHUD(){

    document.getElementById("hud").innerHTML=
    `
    Galaxy Battle II<br>
    Score: ${score}<br>
    HP: ${player.hp}<br>
    Lives: ${player.lives}<br>
    Enemies: ${enemies.length}
    `;
}

/* ================= GAME OVER ================= */

function drawGameOver(){

    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="red";
    ctx.font="60px Arial";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2-200,
        canvas.height/2-20
    );

    ctx.fillStyle="white";
    ctx.font="28px Arial";

    ctx.fillText(
        "Final Score: "+score,
        canvas.width/2-100,
        canvas.height/2+40
    );

    ctx.fillText(
        "Press R to Restart",
        canvas.width/2-120,
        canvas.height/2+90
    );
}

/* ================= RESTART ================= */

addEventListener("keydown",e=>{

    if(e.key=="r" && gameOver){

        player=new Player();

        enemies=[];

        score=0;

        gameOver=false;
    }
});

/* ================= MAIN LOOP ================= */

function loop(){

    if(!running) return;

    requestAnimationFrame(loop);

    drawBackground();

    if(!gameOver){

        movePlayer();

        shoot();

        spawnEnemies();

        player.draw();

        updateBullets();

        updateEnemies();

        drawHUD();

    } else {

        drawGameOver();
    }
}

</script>

</body>
</html>
</html>
